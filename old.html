    <style> 
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Courier New', monospace; }

        #ui-layer { position: absolute; top: 20px; left: 20px; color: #00ff00; z-index: 10; pointer-events: none; }
        #setup-box { background: rgba(0, 30, 0, 0.8); padding: 15px; border: 1px solid #00ff00; pointer-events: auto; }

        #hud-bottom { position: absolute; bottom: 20px; left: 20px; color: #00ff00; font-size: 1.2rem; pointer-events: none; }

        #navball-wrapper {
            position: absolute; bottom: 20px; right: 20px;
            width: 180px; height: 180px;
            border-radius: 50%; border: 3px solid #444;
            background: #111; overflow: hidden;
        }
        #plane-icon {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; pointer-events: none;
        }

        #radar-wrapper {
            position: absolute; bottom: 20px; right: 20px;
            width: 180px; height: 180px;
            border-radius: 50%; border: 2px solid #00ff00;
            background: rgba(0, 20, 0, 0.8); overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        #radar-canvas { position: absolute; top: 0; left: 0; }
        #radar-sweep {
            position: absolute; width: 100%; height: 100%;
            background: conic-gradient(from 0deg, rgba(0,255,0,0.3) 0%, transparent 10%);
            animation: sweep 2s linear infinite;
            border-radius: 50%;
        }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        input  { background: #001100; border: 1px solid #00ff00; color: #00ff00; padding: 5px; }
        button { cursor: pointer; background: #00ff00; color: #001100; border: none; padding: 5px 10px; font-weight: bold; }
        .stat  { margin-bottom: 5px; background: rgba(0,0,0,0.3); padding: 2px 5px; }
    </style>

        let conn = null;

        function handleConn(c) {
            conn = c;
            conn.on('open', () => { 
                remotePlane.visible = true; 
                document.getElementById('setup-box').style.display = 'none'; 
            });
            
            conn.on('data', d => {
                if (d.type === 'fire') {
                    fireBullet(remotePlane);
                } else {
                    remotePlane.position.set(d.x, d.y, d.z); 
                    remotePlane.quaternion.set(d.qx, d.qy, d.qz, d.qw); 
                }
            });
        }

   

        const enemyHighlight = createTargetHighlight(0xff0000, THREE, scene); 

       

        // --- 6. GUN SYSTEM ---
        const bullets      = [];
        const BULLET_SPEED = 6;
        const BULLET_LIFE  = 120;
        const BULLET_POOL  = 1800;
        const FIRE_RATE    = 2;
        let   fireTimer    = 0;   

        const tracerPool = [];
        for (let i = 0; i < BULLET_POOL; i++) {
            const geo  = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
            const mat  = new THREE.LineBasicMaterial({ color: 0xffff00, transparent: true });
            const line = new THREE.Line(geo, mat);
            line.visible = false;
            scene.add(line);
            tracerPool.push({ line, geo });
        }

        function fireBullet(planeSource) {
            // Using pre-allocated _vDir instead of instantiating new Vector3 on every shot
            _vDir.copy(_vForward).applyQuaternion(planeSource.quaternion);
            const poolIdx  = bullets.length % BULLET_POOL;
            bullets.push({
                pos:     planeSource.position.clone().addScaledVector(_vDir, 3), // Clone needed here to store unique position
                vel:     _vDir.clone().multiplyScalar(BULLET_SPEED),
                life:    BULLET_LIFE,
                poolIdx,
            });
        }

        // --- 7. FLIGHT LOGIC ---
        const keys = {};
        let respawnTimer = 0;
        window.addEventListener('keydown',   e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup',     e => keys[e.key.toLowerCase()] = false);
        window.addEventListener('mousedown', e => { if (e.button === 0) keys['f'] = true; });
        window.addEventListener('mouseup',   e => { if (e.button === 0) keys['f'] = false; });

        function update() {
            const rSpeed = 0.03;
            camera.rotation.z = THREE.MathUtils.lerp(camera.rotation.z, (keys['a'] ? 0.05 : keys['d'] ? -0.05 : 0), 0.1);
            // --- 1. ROTATION CONTROLS ---
            if (keys['w']) localPlane.rotateX(-rSpeed);
            if (keys['s']) localPlane.rotateX(rSpeed);
            if (keys['q']) localPlane.rotateZ(rSpeed * 1.5);
            if (keys['e']) localPlane.rotateZ(-rSpeed * 1.5);
            if (keys['a']) localPlane.rotateY(rSpeed);
            if (keys['d']) localPlane.rotateY(-rSpeed);
            if (keys['h']) {
                keys['h'] = false; // Prevent rapid toggling
                toggleElement();
            }

            // --- 2. AERODYNAMICS & PHYSICS ---
            _vDir.copy(_vForward).applyQuaternion(localPlane.quaternion); // Avoid 'new Vector3'
            const currentSpeed = velocity.length();

            const thrustPower = keys[' '] ? THRUST_BOOST : BASE_THRUST;
            velocity.addScaledVector(_vDir, thrustPower);

            velocity.y -= GRAVITY;

            const airResistance = currentSpeed > 1.0 ? 0.06 : 0.04; 
            velocity.multiplyScalar(1 - airResistance);

            if (velocity.length() > MAX_SPEED) {
                velocity.setLength(MAX_SPEED);
            }

            localPlane.position.add(velocity);

            // --- 3. FIRING ---
            fireTimer++;
            if (keys['f'] && fireTimer >= FIRE_RATE) {
                fireTimer = 0; 
                fireBullet(localPlane); 
                if (conn && conn.open) conn.send({ type: 'fire' });
            }

            // --- 4. BULLET TICK ---
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                _vBulletPrev.copy(b.pos); // Avoid b.pos.clone()
                b.pos.add(b.vel);
                b.life--;

                const t = tracerPool[b.poolIdx];
                const p = t.geo.attributes.position;
                _vBulletPrev.toArray(p.array, 0);
                b.pos.toArray(p.array, 3);
                p.needsUpdate = true;
                t.line.visible = true;
                t.line.material.opacity = b.life / BULLET_LIFE;

                const gh = getTerrainHeight(b.pos.x, b.pos.z);
                const hitGnd = b.pos.y <= gh;
                const hitPlane = remotePlane.visible && b.pos.distanceTo(remotePlane.position) < 8;

                if (hitGnd || hitPlane || b.life <= 0) {
                    if (hitGnd || hitPlane) createExplosion(b.pos.clone(), scene, THREE);
                    t.line.visible = false;
                    bullets.splice(i, 1);
                }
            }

         // --- 5. CRASH LOGIC ---
if (respawnTimer > 0) {
    respawnTimer--;
    if (respawnTimer === 0) {
        localPlane.position.set(0, 500, 0);
        localPlane.rotation.set(0, 0, 0);
        velocity.set(0, 0, 0);
        localPlane.visible = true;
    }
} else {
    const gh = getTerrainHeight(localPlane.position.x, localPlane.position.z);
    const waterLevel = wkh + 10;
    if (localPlane.position.y <= gh + 5 || localPlane.position.y < waterLevel) {
        createExplosion(localPlane.position.clone(), scene, THREE);
        localPlane.visible = false;
        respawnTimer = 180;
    }
}





// --- 6. TARGET HIGHLIGHT & LOCKING ---
if (remotePlane && remotePlane.visible ) {
    enemyHighlight.visible = true;
    enemyHighlight.position.copy(remotePlane.position);
    const dist = localPlane.position.distanceTo(remotePlane.position);
    if (lockedTarget === remotePlane) {
        enemyHighlight.material.color.setHex(0x00ffff);
        enemyHighlight.rotateZ(0.1);
    } else {
        enemyHighlight.material.color.setHex(0xff0000);
        enemyHighlight.rotateZ(0.02);
    }
    const scale = Math.max(1, dist / 500);
    enemyHighlight.scale.set(scale, scale, scale);

}

if (localPlane.visible) {

    camera.lookAt(localPlane.position);
    const speedEffect = currentSpeed * 0.05;
    camera.fov = 35+ (speedEffect * 0.5);
    camera.updateProjectionMatrix();
} else if (respawnTimer > 0) {
    camera.position.y += 0.4;
    camera.lookAt(_vCamGoal);
}

if (conn && conn.open && localPlane.visible) {

        qz: localPlane.quaternion.z, qw: localPlane.quaternion.w,
    });
}

document.getElementById('alt').innerText = Math.round(localPlane.position.y * 0.8);
